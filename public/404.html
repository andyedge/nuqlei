<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nuqlei</title>
    <script>
      // GitHub Pages SPA redirect.
      // Repo is deployed at /nuqlei/ (1 path segment).
      // We preserve the full path after the repo segment so React Router can handle it.
      var l = window.location;
      var pathSegments = l.pathname.split('/');
      // pathSegments = ['', 'nuqlei', 'email', 'registration-confirmation']
      // Keep everything up to and including the repo segment (index 2 = 'nuqlei'):
      var basePath = pathSegments.slice(0, 2).join('/');      // '/nuqlei'
      var routePath = '/' + pathSegments.slice(2).join('/');  // '/email/registration-confirmation'
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        basePath + '/?p=' + routePath.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

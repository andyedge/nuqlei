<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuqlei — Industrial B2B Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- GitHub Pages SPA: restore original path after 404.html redirect -->
    <script>
      (function() {
        // Handle ?p= query param set by 404.html
        var search = window.location.search;
        if (search && search.indexOf('p=') !== -1) {
          var params = search.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('=');
            p[decodeURIComponent(r[0])] = decodeURIComponent(r.slice(1).join('=').replace(/~and~/g, '&'));
            return p;
          }, {});
          if (params.p !== undefined) {
            // pathname is '/nuqlei/' — strip trailing slash before appending route
            var base = window.location.pathname.replace(/\/$/, '');
            var route = params.p || '/';
            window.history.replaceState(
              null, null,
              base + route +
              (params.q ? '?' + params.q : '') +
              window.location.hash
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
